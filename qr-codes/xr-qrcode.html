<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>XR Test QR Code</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
        font-family: Arial, sans-serif;
        padding: 1rem;
      }
      .card {
        width: min(94vw, 420px);
        background: rgba(15, 23, 42, 0.95);
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;
        padding: 1.2rem;
        box-shadow: 0 20px 45px rgba(0,0,0,0.35);
        text-align: center;
      }
      h1 {
        font-size: 1.15rem;
        margin: 0 0 0.5rem;
      }
      p {
        font-size: 0.95rem;
        line-height: 1.5;
        margin: 0.35rem 0 0.8rem;
      }
      img {
        width: min(78vw, 260px);
        height: auto;
        display: block;
        margin: 0 auto 0.8rem;
        border-radius: 16px;
        background: white;
        padding: 0.6rem;
      }
      a.button {
        display: inline-block;
        margin-top: 0.4rem;
        padding: 0.8rem 1rem;
        border-radius: 999px;
        background: #4f46e5;
        color: white;
        text-decoration: none;
        font-weight: 600;
      }
      .link {
        word-break: break-all;
        font-size: 0.85rem;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>WebXR Test</h1>
      <p>Scanne den QR-Code für den XR-Test auf deinem Google Pixel.</p>
      <img src="xr-qrcode.png" alt="QR-Code zur WebXR-Test-Seite" />
      <a class="button" href="https://wefoth.github.io/WEBXR_TEST/src/xr-test.html">Zum XR-Test</a>
      <p class="link">https://wefoth.github.io/WEBXR_TEST/src/xr-test.html</p>
    </div>
  </body>
</html>
