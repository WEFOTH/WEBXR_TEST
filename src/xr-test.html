<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebXR Test</title>
    <style>
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        background: #1a1a1a;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #info {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        max-width: 300px;
        z-index: 10;
      }
      #arStatus {
        position: absolute;
        bottom: 8.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #4ade80;
        padding: 0.8rem 1.2rem;
        border-radius: 8px;
        font-weight: bold;
        z-index: 10;
      }
      #placeBtn {
        position: absolute;
        bottom: 0.5rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 1rem 1.5rem;
        border-radius: 8px;
        background: #4f46e5;
        color: white;
        border: 2px solid #6366f1;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        z-index: 10;
        display: none;
      }
      /* Three.js ARButton ("START/STOP AR") setzt seine Position per Inline-Style
         unten mittig – per !important über den Platzieren-Button verschieben */
      #ARButton {
        bottom: 4.75rem !important;
      }
      #modelControl {
        margin-top: 0.8rem;
        display: flex;
        gap: 0.4rem;
      }
      #modelControl .fileBtn,
      #modelControl button {
        flex: 1;
        padding: 0.45rem 0.5rem;
        border-radius: 6px;
        background: #4f46e5;
        color: white;
        border: 1px solid #6366f1;
        text-align: center;
        font-size: 0.85rem;
        cursor: pointer;
      }
      #modelControl button {
        background: #1e293b;
        border-color: #475569;
      }
      #modelInput {
        display: none;
      }
      #scaleControl {
        margin-top: 0.8rem;
      }
      #scaleControl label {
        display: block;
        margin-bottom: 0.3rem;
      }
      #scaleControl input[type='range'] {
        width: 100%;
        accent-color: #4f46e5;
      }
      #shadingControl {
        margin-top: 0.8rem;
      }
      #shadingControl label {
        display: block;
        margin-bottom: 0.3rem;
      }
      #shadingControl select {
        width: 100%;
        padding: 0.4rem;
        border-radius: 6px;
        background: #1e293b;
        color: white;
        border: 1px solid #475569;
        margin-bottom: 0.6rem;
      }
      #shadingControl input[type='color'] {
        width: 100%;
        height: 2.2rem;
        border: 1px solid #475569;
        border-radius: 6px;
        background: #1e293b;
        padding: 0.15rem;
        cursor: pointer;
      }
      #selectControl {
        margin-top: 0.8rem;
      }
      #selectControl label {
        display: block;
        margin-bottom: 0.3rem;
      }
      .objRow {
        display: flex;
        gap: 0.4rem;
        align-items: center;
        margin-bottom: 0.4rem;
      }
      .objRow button {
        flex: 1;
        padding: 0.45rem 0.6rem;
        border-radius: 6px;
        background: #1e293b;
        color: white;
        border: 1px solid #475569;
        cursor: pointer;
        font-size: 0.9rem;
      }
      .objRow button.danger {
        background: #7f1d1d;
        border-color: #b91c1c;
      }
      #objLabel {
        flex: 2;
        text-align: center;
        font-size: 0.9rem;
        color: #cbd5e1;
      }
      /* Crosshair für AR Positionierung */
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60px;
        height: 60px;
        z-index: 5;
        pointer-events: none;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.6);
      }
      #crosshair::before {
        width: 40px;
        height: 2px;
        top: 50%;
        left: 50%;
        transform: translateX(-50%) translateY(-50%);
      }
      #crosshair::after {
        width: 2px;
        height: 40px;
        top: 50%;
        left: 50%;
        transform: translateX(-50%) translateY(-50%);
      }
    </style>
  </head>
  <body>
    <div id="info">
      <h2>WebXR Test</h2>
      <p>Google Pixel XR Test</p>
      <p id="xrSupport">XR wird geladen...</p>
      <div id="modelControl">
        <label class="fileBtn" for="modelInput">Rhino-Modell laden</label>
        <input type="file" id="modelInput" accept=".glb,.gltf,.3dm" />
        <button id="sphereBtn" type="button">Kugel</button>
      </div>
      <div id="scaleControl">
        <label for="scaleSlider">Größe: <span id="scaleValue">1.0×</span></label>
        <input type="range" id="scaleSlider" min="0.2" max="3" step="0.1" value="1" />
      </div>
      <div id="shadingControl">
        <label for="shadingSelect">Shading:</label>
        <select id="shadingSelect">
          <option value="original">Original (Import)</option>
          <option value="standard" selected>Farbe (Standard)</option>
          <option value="wireframe">Wireframe</option>
          <option value="metall">Metallisch</option>
          <option value="matt">Matt</option>
          <option value="transparent">Transparent</option>
        </select>
        <label for="colorInput">Farbe:</label>
        <input type="color" id="colorInput" value="#4f46e5" />
      </div>
      <div id="selectControl">
        <label>Objektauswahl:</label>
        <div class="objRow">
          <button id="prevObjBtn" type="button">◀</button>
          <span id="objLabel">kein Objekt</span>
          <button id="nextObjBtn" type="button">▶</button>
        </div>
        <div class="objRow">
          <button id="moveObjBtn" type="button">Verschieben</button>
          <button id="deleteObjBtn" type="button" class="danger">Löschen</button>
        </div>
      </div>
    </div>
    <div id="arStatus">Bereit für AR</div>
    <div id="crosshair"></div>
    <button id="placeBtn">Objekt platzieren</button>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
      import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';
      import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';
      import { Rhino3dmLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/3DMLoader.js';

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.set(0, 1, 3);
      camera.lookAt(0, 0.6, 0);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);

      // Grid Ebene für Visualisierung
      const gridHelper = new THREE.GridHelper(10, 20, 0x4ade80, 0x666666);
      gridHelper.position.y = -2.5;
      scene.add(gridHelper);

      // Lichter
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      // AR Button
      const arButton = ARButton.createButton(renderer, {
        optionalFeatures: ['dom-overlay', 'hit-test', 'anchors'],
        domOverlay: { root: document.body }
      });
      document.body.appendChild(arButton);

      // --- UI-Elemente ---
      const placeBtn = document.getElementById('placeBtn');
      const arStatusEl = document.getElementById('arStatus');
      const scaleSlider = document.getElementById('scaleSlider');
      const scaleValue = document.getElementById('scaleValue');
      const shadingSelect = document.getElementById('shadingSelect');
      const colorInput = document.getElementById('colorInput');
      const objLabel = document.getElementById('objLabel');

      let isARActive = false;
      let placedObjects = [];
      let selectedObject = null;
      let currentScale = 1;
      let currentShading = 'standard';
      let currentColor = '#4f46e5';

      // Reticle markiert den per Hit-Test erkannten Punkt auf realen Flächen
      const reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.08, 0.11, 32).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0x4ade80 })
      );
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      let hitTestSource = null;
      let lastHitResult = null;

      // Gelber Ring markiert das ausgewählte Objekt
      const selectionRing = new THREE.Mesh(
        new THREE.RingGeometry(1.05, 1.2, 48).rotateX(-Math.PI / 2),
        new THREE.MeshBasicMaterial({ color: 0xfacc15, side: THREE.DoubleSide })
      );
      selectionRing.visible = false;
      scene.add(selectionRing);

      // Schatten-Material für Objekte
      const shadowMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });

      // --- Vorlage (Template): Standard-Kugel oder importiertes Rhino-Modell ---
      // templateSource bleibt unangetastet; Vorschau und platzierte Objekte
      // sind Klone mit eigenen Materialien. Ursprung der Vorlage = Unterkante,
      // größte Kante = 1,2 m bei Slider 1.
      let templateSource = null;
      let templateHeight = 1.2;
      let previewNode = null;

      const sphereGeometry = new THREE.IcosahedronGeometry(1, 4);
      const sphereMaterial = new THREE.MeshStandardMaterial({
        color: 0x4f46e5,
        emissive: 0x2563eb,
        metalness: 0.4,
        roughness: 0.3,
      });

      function makeSphereTemplate() {
        const group = new THREE.Group();
        const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        sphere.scale.setScalar(0.6);
        sphere.position.y = 0.6;
        group.add(sphere);
        return { node: group, height: 1.2 };
      }

      // Importiertes Modell auf einheitliche Größe bringen und den Ursprung
      // auf die Unterkante (Boden-Mittelpunkt) legen
      function normalizeModel(model) {
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        model.scale.multiplyScalar(1.2 / maxDim);
        const box2 = new THREE.Box3().setFromObject(model);
        const center = new THREE.Vector3();
        box2.getCenter(center);
        model.position.x -= center.x;
        model.position.z -= center.z;
        model.position.y -= box2.min.y;
        const group = new THREE.Group();
        group.add(model);
        return { node: group, height: box2.max.y - box2.min.y };
      }

      // Klon mit eigenen Materialien ausstatten: baseMaterial = Original
      // (z. B. Rhino-Material), shadeMaterial = umschaltbares Arbeitsmaterial
      function prepareNode(node) {
        node.traverse((child) => {
          if (!child.isMesh) return;
          child.baseMaterial = child.material.clone();
          child.baseMaterial.side = THREE.DoubleSide;
          const work = new THREE.MeshStandardMaterial({ metalness: 0.4, roughness: 0.3 });
          if (child.material.color) work.color.copy(child.material.color);
          work.side = THREE.DoubleSide;
          child.shadeMaterial = work;
          child.material = child.baseMaterial;
        });
      }

      // Arbeitsmaterial entsprechend Shading-Modus und Farbe konfigurieren
      function applyShading(mat, mode, colorHex) {
        mat.color.set(colorHex);
        mat.wireframe = mode === 'wireframe';
        mat.transparent = mode === 'transparent';
        mat.opacity = mode === 'transparent' ? 0.35 : 1;
        mat.depthWrite = mode !== 'transparent';
        if (mode === 'metall') {
          mat.metalness = 1;
          mat.roughness = 0.15;
        } else if (mode === 'matt') {
          mat.metalness = 0;
          mat.roughness = 1;
        } else {
          mat.metalness = 0.4;
          mat.roughness = 0.3;
        }
        mat.emissive.copy(mat.color).multiplyScalar(mode === 'matt' ? 0 : 0.25);
        mat.needsUpdate = true;
      }

      function applyShadingToNode(node, mode, colorHex) {
        node.traverse((child) => {
          if (!child.isMesh || !child.baseMaterial) return;
          if (mode === 'original') {
            child.material = child.baseMaterial;
          } else {
            applyShading(child.shadeMaterial, mode, colorHex);
            child.material = child.shadeMaterial;
          }
        });
      }

      function rebuildPreview() {
        if (previewNode) scene.remove(previewNode);
        previewNode = templateSource.clone(true);
        prepareNode(previewNode);
        applyShadingToNode(previewNode, currentShading, currentColor);
        previewNode.scale.setScalar(currentScale);
        scene.add(previewNode);
      }

      function setTemplate(node, height) {
        templateSource = node;
        templateHeight = height;
        rebuildPreview();
      }

      const sphereTemplate = makeSphereTemplate();
      setTemplate(sphereTemplate.node, sphereTemplate.height);

      // --- Rhino-Import: .glb/.gltf (empfohlen) oder .3dm direkt ---
      const gltfLoader = new GLTFLoader();
      const rhinoLoader = new Rhino3dmLoader();
      rhinoLoader.setLibraryPath('https://cdn.jsdelivr.net/npm/rhino3dm@8.0.0-beta2/');

      const modelInput = document.getElementById('modelInput');
      modelInput.addEventListener('change', (event) => {
        const file = event.target.files && event.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        const name = file.name;
        arStatusEl.textContent = `Lade "${name}" ...`;

        const onLoaded = (object) => {
          URL.revokeObjectURL(url);
          const norm = normalizeModel(object);
          // Import zeigt zunächst die Original-Materialien
          currentShading = 'original';
          if (!selectedObject) shadingSelect.value = 'original';
          setTemplate(norm.node, norm.height);
          arStatusEl.textContent = `"${name}" geladen - platzieren!`;
        };
        const onError = () => {
          URL.revokeObjectURL(url);
          arStatusEl.textContent = `Fehler beim Laden von "${name}"`;
        };

        if (name.toLowerCase().endsWith('.3dm')) {
          rhinoLoader.load(url, (object) => {
            // Rhino ist Z-hoch, three.js Y-hoch
            object.rotation.x = -Math.PI / 2;
            onLoaded(object);
          }, undefined, onError);
        } else {
          gltfLoader.load(url, (gltf) => onLoaded(gltf.scene), undefined, onError);
        }
        // gleiche Datei erneut wählbar machen
        modelInput.value = '';
      });

      document.getElementById('sphereBtn').addEventListener('click', () => {
        const t = makeSphereTemplate();
        currentShading = 'standard';
        if (!selectedObject) shadingSelect.value = 'standard';
        setTemplate(t.node, t.height);
        arStatusEl.textContent = 'Standard-Kugel als Vorlage';
      });

      // --- Auswahl per Tap: Ray gegen platzierte Objekte ---
      const raycaster = new THREE.Raycaster();
      const tempMatrix = new THREE.Matrix4();
      const controller = renderer.xr.getController(0);
      controller.addEventListener('select', () => {
        if (!isARActive) return;
        tempMatrix.identity().extractRotation(controller.matrixWorld);
        raycaster.ray.origin.setFromMatrixPosition(controller.matrixWorld);
        raycaster.ray.direction.set(0, 0, -1).applyMatrix4(tempMatrix);
        const hits = raycaster.intersectObjects(placedObjects.map((o) => o.node), true);
        if (hits.length > 0) {
          // Getroffenes Mesh dem zugehörigen platzierten Objekt zuordnen
          let target = hits[0].object;
          let found = null;
          while (target && !found) {
            found = placedObjects.find((o) => o.node === target) || null;
            target = target.parent;
          }
          if (found) selectObject(found);
        } else {
          selectObject(null); // Tap ins Leere hebt die Auswahl auf
        }
      });
      scene.add(controller);

      // Taps auf die Bedienelemente sollen kein XR-select auslösen
      for (const el of [document.getElementById('info'), arStatusEl, placeBtn, arButton]) {
        el.addEventListener('beforexrselect', (event) => event.preventDefault());
      }

      function selectObject(obj) {
        selectedObject = obj;
        if (obj) {
          // UI auf die Werte des gewählten Objekts setzen
          scaleSlider.value = obj.scaleFactor;
          scaleValue.textContent = `${obj.scaleFactor.toFixed(1)}×`;
          shadingSelect.value = obj.shading;
          colorInput.value = obj.color;
          objLabel.textContent = `Objekt ${placedObjects.indexOf(obj) + 1} von ${placedObjects.length}`;
          arStatusEl.textContent = `Objekt ${placedObjects.indexOf(obj) + 1} ausgewählt`;
        } else {
          // Keine Auswahl: UI steuert Vorschau und neue Objekte
          scaleSlider.value = currentScale;
          scaleValue.textContent = `${currentScale.toFixed(1)}×`;
          shadingSelect.value = currentShading;
          colorInput.value = currentColor;
          objLabel.textContent = placedObjects.length > 0 ? `kein Objekt (${placedObjects.length} platziert)` : 'kein Objekt';
          arStatusEl.textContent = 'Tippe ein Objekt an, um es auszuwählen';
        }
        updateSelectionRing();
      }

      function updateSelectionRing() {
        if (!selectedObject) {
          selectionRing.visible = false;
          return;
        }
        const sf = selectedObject.scaleFactor;
        selectionRing.visible = true;
        selectionRing.scale.setScalar(0.6 * sf);
        selectionRing.position.copy(selectedObject.basePoint);
        selectionRing.position.y += selectedObject.onSurface ? 0.02 : -(selectedObject.height * sf) / 2 + 0.02;
      }

      // --- Regler: wirken auf das gewählte Objekt, sonst auf die Vorschau ---
      scaleSlider.addEventListener('input', () => {
        const value = parseFloat(scaleSlider.value);
        scaleValue.textContent = `${value.toFixed(1)}×`;
        if (selectedObject) {
          selectedObject.scaleFactor = value;
          updatePlacedTransform(selectedObject);
          updateSelectionRing();
        } else {
          currentScale = value;
          previewNode.scale.setScalar(currentScale);
        }
      });

      shadingSelect.addEventListener('change', () => {
        if (selectedObject) {
          selectedObject.shading = shadingSelect.value;
          applyShadingToNode(selectedObject.node, selectedObject.shading, selectedObject.color);
        } else {
          currentShading = shadingSelect.value;
          applyShadingToNode(previewNode, currentShading, currentColor);
        }
      });

      colorInput.addEventListener('input', () => {
        if (selectedObject) {
          selectedObject.color = colorInput.value;
          applyShadingToNode(selectedObject.node, selectedObject.shading, selectedObject.color);
        } else {
          currentColor = colorInput.value;
          applyShadingToNode(previewNode, currentShading, currentColor);
        }
      });

      // --- Auswahl-Buttons: Durchschalten, Verschieben, Löschen ---
      function cycleSelection(dir) {
        if (placedObjects.length === 0) return;
        let idx = selectedObject ? placedObjects.indexOf(selectedObject) : -1;
        if (idx === -1) {
          idx = dir > 0 ? 0 : placedObjects.length - 1;
        } else {
          idx = (idx + dir + placedObjects.length) % placedObjects.length;
        }
        selectObject(placedObjects[idx]);
      }

      document.getElementById('prevObjBtn').addEventListener('click', () => cycleSelection(-1));
      document.getElementById('nextObjBtn').addEventListener('click', () => cycleSelection(1));

      // Gewähltes Objekt an den aktuellen Zielpunkt (Reticle) versetzen
      document.getElementById('moveObjBtn').addEventListener('click', () => {
        if (!selectedObject || !isARActive) return;
        const target = getPlacementPoint();
        selectedObject.basePoint.copy(target.point);
        selectedObject.onSurface = target.onSurface;
        attachAnchor(selectedObject);
        updatePlacedTransform(selectedObject);
        updateSelectionRing();
        arStatusEl.textContent = 'Objekt verschoben';
      });

      // Gewähltes Objekt samt Schatten entfernen
      document.getElementById('deleteObjBtn').addEventListener('click', () => {
        if (!selectedObject) return;
        const obj = selectedObject;
        const idx = placedObjects.indexOf(obj);
        scene.remove(obj.node);
        scene.remove(obj.shadow);
        obj.node.traverse((child) => {
          if (child.isMesh) {
            if (child.baseMaterial) child.baseMaterial.dispose();
            if (child.shadeMaterial) child.shadeMaterial.dispose();
          }
        });
        obj.shadow.geometry.dispose();
        if (obj.anchor && typeof obj.anchor.delete === 'function') obj.anchor.delete();
        placedObjects.splice(idx, 1);
        // Nächstes verbleibendes Objekt auswählen, sonst Auswahl aufheben
        if (placedObjects.length > 0) {
          selectObject(placedObjects[Math.min(idx, placedObjects.length - 1)]);
        } else {
          selectObject(null);
        }
        arStatusEl.textContent = 'Objekt gelöscht';
      });

      // Position und Größe eines platzierten Objekts aus seinem
      // Fixpunkt (basePoint) und seinem Skalierungsfaktor ableiten
      function updatePlacedTransform(obj) {
        const sf = obj.scaleFactor;
        obj.node.scale.setScalar(sf);
        obj.shadow.scale.setScalar(sf);
        obj.node.position.copy(obj.basePoint);
        obj.shadow.position.copy(obj.basePoint);
        if (obj.onSurface) {
          obj.shadow.position.y += 0.01; // knapp über der Fläche gegen Z-Fighting
        } else {
          // frei schwebend: Objektmitte am Zielpunkt, Schatten an der Unterkante
          const drop = (obj.height * sf) / 2;
          obj.node.position.y -= drop;
          obj.shadow.position.y -= drop;
        }
      }

      // Aktuellen Zielpunkt bestimmen: Hit-Test-Punkt auf realer Fläche
      // oder Fallback 2 m in Blickrichtung
      function getPlacementPoint() {
        const point = new THREE.Vector3();
        const onSurface = reticle.visible;
        if (onSurface) {
          point.setFromMatrixPosition(reticle.matrix);
        } else {
          const xrCamera = renderer.xr.getCamera();
          const direction = new THREE.Vector3();
          xrCamera.getWorldDirection(direction);
          xrCamera.getWorldPosition(point);
          point.addScaledVector(direction, 2);
        }
        return { point: point, onSurface: onSurface };
      }

      // WebXR-Anker halten das Objekt am realen Punkt fest, auch wenn
      // das Tracking die Umgebung später neu einschätzt
      function attachAnchor(obj) {
        if (obj.anchor && typeof obj.anchor.delete === 'function') obj.anchor.delete();
        obj.anchor = null;
        if (obj.onSurface && lastHitResult && lastHitResult.createAnchor) {
          lastHitResult.createAnchor().then((anchor) => {
            obj.anchor = anchor;
          }).catch(() => {
            // Gerät ohne Anker-Unterstützung: Objekt bleibt an Weltkoordinate
          });
        }
      }

      // Platzierungs-Button
      placeBtn.addEventListener('click', () => {
        if (!isARActive) return;

        const node = templateSource.clone(true);
        prepareNode(node);
        applyShadingToNode(node, currentShading, currentColor);
        const target = getPlacementPoint();
        scene.add(node);

        const shadowGeo = new THREE.PlaneGeometry(1.2, 1.2);
        const shadow = new THREE.Mesh(shadowGeo, shadowMaterial);
        shadow.rotation.x = -Math.PI / 2;
        scene.add(shadow);

        const placed = {
          node: node,
          shadow: shadow,
          basePoint: target.point,
          onSurface: target.onSurface,
          anchor: null,
          scaleFactor: currentScale,
          shading: currentShading,
          color: currentColor,
          height: templateHeight
        };
        updatePlacedTransform(placed);
        placedObjects.push(placed);
        attachAnchor(placed);
        selectObject(placed); // neues Objekt ist direkt ausgewählt

        arStatusEl.textContent = `${placedObjects.length} Objekt(e) platziert!`;
        setTimeout(() => {
          arStatusEl.textContent = 'Tippe "Objekt platzieren" für mehr';
        }, 2000);
      });

      renderer.xr.addEventListener('sessionstart', async () => {
        isARActive = true;
        placeBtn.style.display = 'block';
        arStatusEl.textContent = 'AR aktiv - tippe "Objekt platzieren"';

        // Hit-Test aus Blickrichtung (Bildschirmmitte) anfordern
        try {
          const session = renderer.xr.getSession();
          const viewerSpace = await session.requestReferenceSpace('viewer');
          hitTestSource = await session.requestHitTestSource({ space: viewerSpace });
        } catch (e) {
          // Gerät ohne Hit-Test: Platzierung fällt auf Blickrichtung zurück
          hitTestSource = null;
        }
      });

      renderer.xr.addEventListener('sessionend', () => {
        isARActive = false;
        placeBtn.style.display = 'none';
        hitTestSource = null;
        lastHitResult = null;
        reticle.visible = false;
        // Anker gelten nur innerhalb der Session
        placedObjects.forEach((obj) => { obj.anchor = null; });
        selectObject(null);
        arStatusEl.textContent = 'Bereit für AR';
      });

      function animate(time, frame) {
        if (frame) {
          const refSpace = renderer.xr.getReferenceSpace();

          // Reticle auf der erkannten Fläche positionieren
          if (hitTestSource) {
            const hits = frame.getHitTestResults(hitTestSource);
            if (hits.length > 0) {
              lastHitResult = hits[0];
              const pose = lastHitResult.getPose(refSpace);
              reticle.visible = true;
              reticle.matrix.fromArray(pose.transform.matrix);
            } else {
              lastHitResult = null;
              reticle.visible = false;
            }
          }

          // Verankerte Objekte an ihrer realen Position nachführen
          placedObjects.forEach((obj) => {
            if (!obj.anchor) return;
            let pose = null;
            try {
              pose = frame.getPose(obj.anchor.anchorSpace, refSpace);
            } catch (e) {
              obj.anchor = null; // Anker wurde vom System verworfen
            }
            if (pose) {
              const p = pose.transform.position;
              obj.basePoint.set(p.x, p.y, p.z);
              updatePlacedTransform(obj);
              if (obj === selectedObject) updateSelectionRing();
            }
          });
        }

        // Nur die Vorschau rotiert; platzierte Objekte bleiben fixiert
        if (previewNode) previewNode.rotation.y += 0.01;

        renderer.render(scene, camera);
      }

      // XR Support Check
      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
          const xrSupport = document.getElementById('xrSupport');
          if (supported) {
            xrSupport.textContent = '✓ AR wird unterstützt';
            xrSupport.style.color = '#4ade80';
          } else {
            xrSupport.textContent = '✗ AR wird nicht unterstützt';
            xrSupport.style.color = '#ef4444';
          }
        });
      } else {
        document.getElementById('xrSupport').textContent = '✗ WebXR nicht verfügbar';
        document.getElementById('xrSupport').style.color = '#ef4444';
      }

      renderer.setAnimationLoop(animate);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
