<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebXR Test</title>
    <style>
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        background: #1a1a1a;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #info {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        max-width: 300px;
        z-index: 10;
      }
      #arStatus {
        position: absolute;
        bottom: 5.5rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #4ade80;
        padding: 0.8rem 1.2rem;
        border-radius: 8px;
        font-weight: bold;
        z-index: 10;
      }
      #placeBtn {
        position: absolute;
        bottom: 0.5rem;
        left: 50%;
        transform: translateX(-50%);
        padding: 1rem 1.5rem;
        border-radius: 8px;
        background: #4f46e5;
        color: white;
        border: 2px solid #6366f1;
        font-weight: bold;
        cursor: pointer;
        font-size: 1rem;
        z-index: 10;
        display: none;
      }
      /* Crosshair für AR Positionierung */
      #crosshair {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 60px;
        height: 60px;
        z-index: 5;
        pointer-events: none;
      }
      #crosshair::before,
      #crosshair::after {
        content: '';
        position: absolute;
        background: rgba(255, 255, 255, 0.6);
      }
      #crosshair::before {
        width: 40px;
        height: 2px;
        top: 50%;
        left: 50%;
        transform: translateX(-50%) translateY(-50%);
      }
      #crosshair::after {
        width: 2px;
        height: 40px;
        top: 50%;
        left: 50%;
        transform: translateX(-50%) translateY(-50%);
      }
    </style>
  </head>
  <body>
    <div id="info">
      <h2>WebXR Test</h2>
      <p>Google Pixel XR Test</p>
      <p id="xrSupport">XR wird geladen...</p>
    </div>
    <div id="arStatus">Bereit für AR</div>
    <div id="crosshair"></div>
    <button id="placeBtn">Objekt platzieren</button>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
      import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);

      // Einfache Geometrien
      const geometry = new THREE.IcosahedronGeometry(1, 4);
      const material = new THREE.MeshStandardMaterial({
        color: 0x4f46e5,
        emissive: 0x2563eb,
        metalness: 0.4,
        roughness: 0.3,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.z = 0;
      scene.add(mesh);

      // Grid Ebene für Visualisierung
      const gridHelper = new THREE.GridHelper(10, 20, 0x4ade80, 0x666666);
      gridHelper.position.y = -2.5;
      scene.add(gridHelper);

      // Lichter
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      // AR Button
      const arButton = ARButton.createButton(renderer, {
        optionalFeatures: ['dom-overlay'],
        domOverlay: { root: document.body }
      });
      document.body.appendChild(arButton);

      let isARActive = false;
      let placedObjects = [];
      const placeBtn = document.getElementById('placeBtn');

      // Schatten-Material für Objekte
      const shadowMaterial = new THREE.ShadowMaterial({ opacity: 0.3 });

      // Platzierungs-Button
      placeBtn.addEventListener('click', () => {
        if (isARActive) {
          const newMesh = mesh.clone();
          // 2 m in Blickrichtung platzieren (nicht entlang der Welt-Z-Achse)
          const xrCamera = renderer.xr.getCamera();
          const direction = new THREE.Vector3();
          xrCamera.getWorldDirection(direction);
          xrCamera.getWorldPosition(newMesh.position);
          newMesh.position.addScaledVector(direction, 2);
          newMesh.scale.set(0.6, 0.6, 0.6);
          scene.add(newMesh);
          
          // Schatten unter dem Objekt hinzufügen
          const shadowGeo = new THREE.PlaneGeometry(1.2, 1.2);
          const shadow = new THREE.Mesh(shadowGeo, shadowMaterial);
          shadow.rotation.x = -Math.PI / 2;
          shadow.position.copy(newMesh.position);
          shadow.position.y = newMesh.position.y - 0.6;
          shadow.userData.parentObject = newMesh;
          scene.add(shadow);
          
          placedObjects.push({mesh: newMesh, shadow: shadow});

          const arStatus = document.getElementById('arStatus');
          arStatus.textContent = `${placedObjects.length} Objekt(e) platziert!`;
          setTimeout(() => {
            arStatus.textContent = 'Tippe "Objekt platzieren" für mehr';
          }, 2000);
        }
      });

      renderer.xr.addEventListener('sessionstart', async () => {
        isARActive = true;
        placeBtn.style.display = 'block';
        const arStatus = document.getElementById('arStatus');
        arStatus.textContent = 'AR aktiv - tippe "Objekt platzieren"';
      });

      renderer.xr.addEventListener('sessionend', () => {
        isARActive = false;
        placeBtn.style.display = 'none';
        const arStatus = document.getElementById('arStatus');
        arStatus.textContent = 'Bereit für AR';
      });

      function animate(time, frame) {
        if (frame) {
          // Render platzierte Objekte
          placedObjects.forEach(obj => {
            obj.mesh.rotation.x += 0.005;
            obj.mesh.rotation.y += 0.01;
            // Schatten unter Objekt aktualisieren
            obj.shadow.position.copy(obj.mesh.position);
            obj.shadow.position.y = obj.mesh.position.y - 0.6;
          });
        }

        mesh.rotation.x += 0.005;
        mesh.rotation.y += 0.01;

        renderer.render(scene, camera);
      }

      // XR Support Check
      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
          const xrSupport = document.getElementById('xrSupport');
          if (supported) {
            xrSupport.textContent = '✓ AR wird unterstützt';
            xrSupport.style.color = '#4ade80';
          } else {
            xrSupport.textContent = '✗ AR wird nicht unterstützt';
            xrSupport.style.color = '#ef4444';
          }
        });
      } else {
        document.getElementById('xrSupport').textContent = '✗ WebXR nicht verfügbar';
        document.getElementById('xrSupport').style.color = '#ef4444';
      }

      renderer.setAnimationLoop(animate);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
