<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebXR Test</title>
    <style>
      body {
        margin: 0;
        width: 100%;
        height: 100vh;
        background: #1a1a1a;
        font-family: Arial, sans-serif;
        overflow: hidden;
      }
      canvas {
        display: block;
      }
      #info {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 1rem;
        border-radius: 8px;
        font-size: 0.9rem;
        max-width: 300px;
        z-index: 10;
      }
      #arStatus {
        position: absolute;
        bottom: 1rem;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.8);
        color: #4ade80;
        padding: 0.8rem 1.2rem;
        border-radius: 8px;
        font-weight: bold;
        z-index: 10;
      }
    </style>
  </head>
  <body>
    <div id="info">
      <h2>WebXR Test</h2>
      <p>Google Pixel XR Test</p>
      <p id="xrSupport">XR wird geladen...</p>
    </div>
    <div id="arStatus">Bereit für AR</div>

    <script type="module">
      import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
      import { ARButton } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/webxr/ARButton.js';

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 5;

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.xr.enabled = true;
      renderer.xr.setReferenceSpaceType('local');
      document.body.appendChild(renderer.domElement);

      // Einfache Geometrien
      const geometry = new THREE.IcosahedronGeometry(1, 4);
      const material = new THREE.MeshStandardMaterial({
        color: 0x4f46e5,
        emissive: 0x2563eb,
        metalness: 0.4,
        roughness: 0.3,
      });

      const mesh = new THREE.Mesh(geometry, material);
      mesh.position.z = 0;
      scene.add(mesh);

      // Lichter
      const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
      scene.add(ambientLight);

      const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
      directionalLight.position.set(5, 5, 5);
      scene.add(directionalLight);

      // AR Button
      const arButton = ARButton.createButton(renderer, {
        requiredFeatures: ['hit-test'],
        optionalFeatures: ['dom-overlay', 'dom-overlay-for-handheld-ar'],
        domOverlay: { root: document.body }
      });
      document.body.appendChild(arButton);

      // AR Hit Test
      const controller = renderer.xr.getController(0);
      scene.add(controller);

      let hitTestSource = null;
      let hitTestSourceRequested = false;
      let reticle = new THREE.Mesh(
        new THREE.RingGeometry(0.15, 0.2, 32),
        new THREE.MeshBasicMaterial({ color: 0x00ff00 })
      );
      reticle.matrixAutoUpdate = false;
      reticle.visible = false;
      scene.add(reticle);

      let placedObjects = [];

      controller.addEventListener('select', () => {
        if (reticle.visible) {
          const clonedMesh = mesh.clone();
          clonedMesh.position.setFromMatrixPosition(reticle.matrix);
          clonedMesh.scale.set(0.6, 0.6, 0.6);
          scene.add(clonedMesh);
          placedObjects.push(clonedMesh);

          const message = document.getElementById('arStatus');
          message.textContent = `${placedObjects.length} Objekt(e) platziert - Tippe erneut!`;
          setTimeout(() => {
            message.textContent = 'AR aktiv - Fläche suchen...';
          }, 2000);
        }
      });

      renderer.xr.addEventListener('sessionstart', async () => {
        const session = renderer.xr.getSession();
        const space = await session.requestReferenceSpace('viewer');
        const source = await session.requestHitTestSource({ space });
        hitTestSource = source;

        const message = document.getElementById('arStatus');
        message.textContent = 'AR aktiv - Fläche suchen...';
      });

      renderer.xr.addEventListener('sessionend', () => {
        hitTestSource = null;
        hitTestSourceRequested = false;
        const message = document.getElementById('arStatus');
        message.textContent = 'Bereit für AR';
      });

      function animate(time, frame) {
        if (frame) {
          const baseSpace = renderer.xr.getReferenceSpace();

          // Hit Testing für Reticle
          if (hitTestSource) {
            const hitTestResults = frame.getHitTestResults(hitTestSource);
            if (hitTestResults.length > 0) {
              const hit = hitTestResults[0];
              const pose = hit.getPose(baseSpace);
              if (pose) {
                reticle.matrix.fromArray(pose.transform.matrix);
                reticle.visible = true;
              }
            } else {
              reticle.visible = false;
            }
          }

          // Render platzierte Objekte
          placedObjects.forEach(obj => {
            obj.rotation.x += 0.005;
            obj.rotation.y += 0.01;
          });
        } else {
          // Non-AR Mode
          reticle.visible = false;
        }

        mesh.rotation.x += 0.005;
        mesh.rotation.y += 0.01;

        renderer.render(scene, camera);
      }

      // XR Support Check
      if (navigator.xr) {
        navigator.xr.isSessionSupported('immersive-ar').then((supported) => {
          const xrSupport = document.getElementById('xrSupport');
          if (supported) {
            xrSupport.textContent = '✓ AR wird unterstützt';
            xrSupport.style.color = '#4ade80';
          } else {
            xrSupport.textContent = '✗ AR wird nicht unterstützt';
            xrSupport.style.color = '#ef4444';
          }
        });
      } else {
        document.getElementById('xrSupport').textContent = '✗ WebXR nicht verfügbar';
        document.getElementById('xrSupport').style.color = '#ef4444';
      }

      renderer.setAnimationLoop(animate);

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });
    </script>
  </body>
</html>
